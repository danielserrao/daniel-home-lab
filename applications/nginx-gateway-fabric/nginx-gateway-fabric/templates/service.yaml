---
# Source: nginx-gateway-fabric/templates/service.yaml
# This is the control plane Service for internal communication with the data plane.
# To get an NGINX LoadBalancer Service, create a Gateway resource once NGINX Gateway Fabric is installed.
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway-fabric
  namespace: gateway-api
  labels:
    helm.sh/chart: nginx-gateway-fabric-2.4.2
    app.kubernetes.io/name: nginx-gateway-fabric
    app.kubernetes.io/instance: nginx-gateway-fabric
    app.kubernetes.io/version: "2.4.2"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nginx-gateway-fabric
    app.kubernetes.io/instance: nginx-gateway-fabric
  ports:
  - name: agent-grpc
    port: 443
    protocol: TCP
    targetPort: 8443
